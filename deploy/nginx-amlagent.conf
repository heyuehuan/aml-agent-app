server {
    listen 80;
    server_name amlagent.heyuehuan.com;
    # Redirect all HTTP to HTTPS after cert is issued
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name amlagent.heyuehuan.com;

    ssl_certificate     /etc/letsencrypt/live/amlagent.heyuehuan.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/amlagent.heyuehuan.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # SSE needs buffering off
    proxy_buffering off;
    proxy_cache off;

    location / {
        proxy_pass         http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Keep SSE connections alive
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
