<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Real-Time AML Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
/* ===== Scotia AML Agent — design tokens ===== */
:root {
  /* Brand */
  --red:          #EC111A;
  --red-dark:     #B50E14;
  --red-deep:     #8A0A0F;
  --red-soft:     rgba(236, 17, 26, 0.08);
  --red-mid:      rgba(236, 17, 26, 0.14);

  /* Surfaces */
  --bg:           #F3F4F8;
  --bg-panel:     #FFFFFF;
  --bg-sidebar:   #FFFFFF;
  --bg-code:      #F0F2F7;

  /* Text */
  --text:         #111827;
  --text-muted:   #4B5563;
  --text-dim:     #6B7280;
  --text-faint:   #9CA3AF;

  /* Borders */
  --line:         #E5E7EB;
  --line-strong:  #D1D5DB;

  /* Cards */
  --card:         #FFFFFF;
  --card-hi:      #F9FAFB;

  /* Semantic */
  --amber:        #B45309;
  --amber-soft:   rgba(180, 83, 9, 0.09);
  --green:        #047857;
  --green-soft:   rgba(4, 120, 87, 0.09);
  --blue:         #1D4ED8;
  --blue-soft:    rgba(29, 78, 216, 0.08);
  --purple:       #7C3AED;
  --purple-soft:  rgba(124, 58, 237, 0.08);
  --danger:       #DC2626;
  --danger-soft:  rgba(220, 38, 38, 0.08);
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: var(--bg);
  color: var(--text);
  font-family: "Inter", system-ui, sans-serif;
  font-feature-settings: "ss01", "cv11";
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

/* Sky is kept in markup but hidden — no starfield on light theme */
.sky { display: none; }

/* ===== Nav ===== */
.nav {
  position: relative; z-index: 10;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px;
  height: 60px;
  background: var(--red);
  border-bottom: none;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(0,0,0,0.18);
}
.brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 16px; letter-spacing: 0.04em; color: #fff; }
.brand .shield { color: #fff; display: grid; place-items: center; opacity: 0.92; }
.brand .b1 { color: #fff; }
.brand .b2 { color: rgba(255,255,255,0.82); }
.nav-right { display: flex; align-items: center; gap: 14px; }
.nav-badge {
  font-size: 14px; font-weight: 700; letter-spacing: 0.1em;
  padding: 5px 13px; border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.35); color: #fff;
  background: rgba(255,255,255,0.15);
}

/* ===== Passcode screen ===== */
.passcode-screen {
  position: relative; z-index: 1;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: calc(100vh - 60px);
  padding: 40px 20px;
  background: var(--bg);
}
.passcode-card {
  width: 100%; max-width: 420px;
  background: var(--bg-panel);
  border: 1px solid var(--line-strong);
  border-radius: 18px;
  padding: 40px 40px 36px;
  box-shadow: 0 4px 32px rgba(0,0,0,0.09);
  animation: fadeUp 0.45s cubic-bezier(0.2, 0.7, 0.3, 1);
}
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.passcode-icon {
  width: 56px; height: 56px; border-radius: 16px; margin: 0 auto 22px;
  background: var(--red-soft);
  border: 1.5px solid var(--red-mid);
  display: grid; place-items: center; color: var(--red);
}
.passcode-card h2 { margin: 0 0 8px; font-size: 24px; font-weight: 800; text-align: center; color: var(--text); }
.passcode-card p { margin: 0 0 28px; font-size: 15px; color: var(--text-muted); text-align: center; line-height: 1.55; }
.passcode-input {
  width: 100%; background: var(--bg); border: 1.5px solid var(--line-strong);
  border-radius: 10px; padding: 13px 16px; color: var(--text);
  font: 500 15px/1 "JetBrains Mono", monospace;
  letter-spacing: 0.08em; outline: none; margin-bottom: 14px;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.passcode-input:focus { border-color: var(--red); box-shadow: 0 0 0 3px var(--red-soft); }
.passcode-input::placeholder { color: var(--text-faint); letter-spacing: 0.04em; }
.passcode-error { font-size: 14px; color: var(--danger); margin-bottom: 10px; text-align: center; font-weight: 500; }
.btn-primary {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; font-weight: 700; font-size: 14px; letter-spacing: 0.02em;
  padding: 13px 22px; border-radius: 10px; border: 0;
  background: var(--red); color: #fff; cursor: pointer;
  box-shadow: 0 2px 10px rgba(236,17,26,0.3);
  transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
}
.btn-primary:hover { background: var(--red-dark); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(236,17,26,0.35); }
.btn-primary:disabled { opacity: 0.5; cursor: default; transform: none; }

/* ===== Main app layout ===== */
.app-layout {
  position: relative; z-index: 1;
  display: flex; height: calc(100vh - 60px);
  overflow: hidden;
}

/* ===== Job list sidebar ===== */
.sidebar {
  width: 300px; flex-shrink: 0;
  display: flex; flex-direction: column;
  border-right: 1px solid var(--line);
  background: var(--bg-sidebar);
  overflow: hidden;
}
.sidebar-head {
  padding: 18px 16px 14px;
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
}
.sidebar-title {
  font-size: 14px; font-weight: 700; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--text-faint); margin-bottom: 12px;
}
.btn-new {
  display: flex; align-items: center; gap: 8px; width: 100%;
  padding: 10px 14px; border-radius: 8px; border: 1.5px solid var(--line-strong);
  background: transparent; color: var(--red);
  font: 600 13px/1 inherit; letter-spacing: 0.01em; cursor: pointer;
  transition: all 0.15s;
}
.btn-new:hover { background: var(--red-soft); border-color: var(--red-mid); }
.sidebar-list { flex: 1; overflow-y: auto; padding: 8px 8px; }
.sidebar-list::-webkit-scrollbar { width: 4px; }
.sidebar-list::-webkit-scrollbar-track { background: transparent; }
.sidebar-list::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 2px; }
.job-item {
  display: flex; flex-direction: column; gap: 5px;
  padding: 11px 12px; border-radius: 8px; cursor: pointer;
  border: 1px solid transparent; margin-bottom: 3px;
  transition: all 0.15s;
}
.job-item:hover { background: var(--bg); border-color: var(--line); }
.job-item.active { background: var(--red-soft); border-color: var(--red-mid); }
.job-item-top { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
.job-subject { font-size: 14px; font-weight: 600; color: var(--text); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.job-item.active .job-subject { color: var(--red-dark); }
.job-risk {
  font-family: "JetBrains Mono", monospace; font-size: 14px; font-weight: 700;
  padding: 2px 8px; border-radius: 4px; flex-shrink: 0; letter-spacing: 0.04em;
}
.job-risk.HIGH { background: var(--danger-soft); color: var(--danger); }
.job-risk.MEDIUM { background: var(--amber-soft); color: var(--amber); }
.job-risk.LOW, .job-risk.CLEAR { background: var(--green-soft); color: var(--green); }
.job-item-meta { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
.status-dot {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 14px; color: var(--text-dim);
}
.dot-pulse { width: 7px; height: 7px; border-radius: 50%; background: var(--red); animation: dotPulse 1.4s ease-out infinite; }
.dot-done { width: 7px; height: 7px; border-radius: 50%; background: var(--green); }
.dot-queued { width: 7px; height: 7px; border-radius: 50%; background: var(--line-strong); }
.dot-failed { width: 7px; height: 7px; border-radius: 50%; background: var(--danger); }
@keyframes dotPulse {
  0% { box-shadow: 0 0 0 0 rgba(236,17,26,0.5); }
  70% { box-shadow: 0 0 0 5px rgba(236,17,26,0); }
  100% { box-shadow: 0 0 0 0 rgba(236,17,26,0); }
}
.job-time { font-size: 14px; color: var(--text-faint); font-family: "JetBrains Mono", monospace; }
.run-btn-small {
  display: inline-flex; align-items: center; gap: 5px; font-size: 14px; font-weight: 700;
  padding: 5px 12px; border-radius: 6px; border: 1.5px solid var(--red-mid);
  background: var(--red-soft); color: var(--red); cursor: pointer;
  transition: all 0.15s; letter-spacing: 0.01em;
}
.run-btn-small:hover { background: var(--red-mid); }

/* ===== Detail panel ===== */
.detail-panel {
  flex: 1; overflow: hidden; display: flex; flex-direction: column;
  background: var(--bg);
}
.detail-panel::-webkit-scrollbar { width: 6px; }
.detail-panel::-webkit-scrollbar-track { background: transparent; }
.detail-panel::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 3px; }

/* Empty state */
.empty-state {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 60px 40px; text-align: center;
  gap: 14px;
}
.empty-icon { color: var(--line-strong); }
.empty-state h3 { margin: 0; font-size: 20px; font-weight: 700; color: var(--text-muted); }
.empty-state p { margin: 0; font-size: 15px; color: var(--text-dim); max-width: 300px; line-height: 1.6; }

/* Composer panel */
.composer-panel { width: 100%; max-width: 1200px; margin: 0 auto; padding: 56px 40px 80px; }
.composer-panel-head { margin-bottom: 32px; }
.panel-eyebrow { font-size: 14px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--red); margin-bottom: 10px; }
.panel-title { font-size: 32px; font-weight: 800; letter-spacing: -0.02em; margin: 0 0 12px; color: var(--text); }
.panel-lede { font-size: 16px; color: var(--text-muted); margin: 0; line-height: 1.65; }
.composer {
  position: relative;
  background: var(--bg-panel);
  border: 1.5px solid var(--line-strong); border-radius: 16px; padding: 24px 24px 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.07);
  transition: border-color 0.2s, box-shadow 0.2s;
}
.composer:focus-within {
  border-color: var(--red);
  box-shadow: 0 0 0 4px var(--red-soft), 0 2px 12px rgba(0,0,0,0.07);
}
.composer textarea {
  width: 100%; background: transparent; border: 0; outline: none; resize: none;
  color: var(--text); font-size: 16px; line-height: 1.65; font-family: inherit;
  font-weight: 400; min-height: 390px; padding: 0 0 12px;
}
.composer textarea::placeholder { color: var(--text-faint); }
.composer-foot {
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px;
  padding-top: 12px; border-top: 1px solid var(--line); margin-top: 2px;
}
.composer-tools { display: flex; gap: 6px; flex-wrap: wrap; }
.chip {
  display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px;
  border-radius: 6px; border: 1px solid var(--line-strong); background: transparent;
  color: var(--text-muted); font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s;
}
.chip:hover { color: var(--text); border-color: var(--text-dim); background: var(--bg); }
.chip.on { color: var(--red); border-color: var(--red-mid); background: var(--red-soft); }
.composer-actions { display: flex; gap: 8px; align-items: center; }
.btn-queue {
  display: inline-flex; align-items: center; gap: 6px; font-weight: 600; font-size: 14px;
  letter-spacing: 0.01em; padding: 10px 18px; border-radius: 8px;
  border: 1.5px solid var(--line-strong); background: transparent; color: var(--text-muted); cursor: pointer;
  transition: all 0.15s;
}
.btn-queue:hover { color: var(--text); background: var(--bg); border-color: var(--text-dim); }
.btn-run {
  display: inline-flex; align-items: center; gap: 7px; font-weight: 700; font-size: 14px;
  letter-spacing: 0.01em; padding: 10px 22px; border-radius: 8px; border: 0;
  background: var(--red); color: #fff; cursor: pointer;
  box-shadow: 0 2px 8px rgba(236,17,26,0.25);
  transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
}
.btn-run:hover { background: var(--red-dark); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(236,17,26,0.3); }
.btn-run:disabled { opacity: 0.45; cursor: default; transform: none; box-shadow: none; }
.suggestions { margin-top: 24px; }
.suggestions-label { font-size: 14px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 8px; }
.suggestions-list { display: flex; flex-direction: column; }
.suggestion {
  display: flex; align-items: baseline; gap: 10px; padding: 7px 2px;
  border: none; background: transparent;
  color: var(--text-muted); cursor: pointer; transition: color 0.12s;
  text-align: left; border-bottom: 1px solid var(--line); width: 100%;
}
.suggestion:last-child { border-bottom: none; }
.suggestion:hover { color: var(--text); }
.suggestion:hover .tc-id { background: var(--red-mid); }
.suggestion .tc-id { font-family: "JetBrains Mono", monospace; font-size: 14px; font-weight: 700; color: var(--red); background: var(--red-soft); border: 1px solid var(--red-mid); border-radius: 3px; padding: 1px 5px; flex-shrink: 0; letter-spacing: 0.04em; transition: background 0.12s; }
.suggestion .tc-icon { display: inline-flex; align-items: center; justify-content: center; width: 24px; flex-shrink: 0; color: var(--red); }
.suggestion .tc-query { font-size: 14px; font-weight: 400; flex: 1; text-align: left; line-height: 1.5; }

/* ===== Run / detail view ===== */
.run-panel { padding: 32px 44px 24px; flex: 1; display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
.run-head {
  display: flex; align-items: flex-start; justify-content: space-between; gap: 20px;
  margin-bottom: 28px; padding-bottom: 24px; border-bottom: 1px solid var(--line);
}
.run-head .job-id {
  font-family: "JetBrains Mono", monospace; font-size: 14px; color: var(--text-faint);
  letter-spacing: 0.06em; margin-bottom: 8px;
}
.run-head .job-title { font-size: 22px; font-weight: 800; line-height: 1.3; margin: 0 0 8px; color: var(--text); }
.run-head .job-meta {
  display: flex; gap: 14px; flex-wrap: wrap; align-items: center;
  font-size: 14px; color: var(--text-muted);
}
.run-head .job-meta > span:not(.sep) { white-space: nowrap; }
.run-head .job-meta .sep { width: 3px; height: 3px; border-radius: 50%; background: var(--line-strong); }
.status-pill {
  display: inline-flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600;
  letter-spacing: 0.01em; padding: 8px 16px; border-radius: 8px;
  border: 1.5px solid var(--line-strong); background: var(--bg); white-space: nowrap; flex-shrink: 0; color: var(--text-muted);
}
.status-pill.running { border-color: var(--red-mid); background: var(--red-soft); color: var(--red); }
.status-pill.done { border-color: rgba(4,120,87,0.25); background: var(--green-soft); color: var(--green); }
.status-pill.failed { border-color: rgba(220,38,38,0.2); background: var(--danger-soft); color: var(--danger); }
.status-pill.queued { border-color: var(--line-strong); color: var(--text-dim); }
.pulse { width: 8px; height: 8px; border-radius: 50%; background: currentColor; animation: pulse 1.5s ease-out infinite; }
@keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(236,17,26,0.4); } 70% { box-shadow: 0 0 0 7px rgba(236,17,26,0); } 100% { box-shadow: 0 0 0 0 rgba(236,17,26,0); } }
.run-actions { display: flex; gap: 8px; margin-top: 20px; }
.btn-ghost {
  display: inline-flex; align-items: center; gap: 7px; font-weight: 600; font-size: 14px;
  letter-spacing: 0.01em; padding: 9px 18px; border-radius: 8px;
  border: 1.5px solid var(--line-strong); background: transparent; color: var(--text-muted); cursor: pointer; transition: all 0.15s;
}
.btn-ghost:hover { background: var(--bg); color: var(--text); border-color: var(--text-dim); }

/* ===== Timeline ===== */
.timeline { position: relative; padding-left: 32px; }
.timeline::before {
  content: ""; position: absolute; left: 10px; top: 10px; bottom: 10px; width: 2px;
  background: linear-gradient(to bottom, var(--line-strong) 0%, var(--line-strong) 95%, transparent 100%);
  border-radius: 1px;
}
.step { position: relative; padding-bottom: 24px; animation: stepIn 0.35s cubic-bezier(0.2,0.7,0.3,1) backwards; }
@keyframes stepIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.step-node {
  position: absolute; left: -32px; top: 2px;
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--bg-panel); border: 2px solid var(--line-strong);
  display: grid; place-items: center; z-index: 1;
}
.step-node .core { width: 8px; height: 8px; border-radius: 50%; background: var(--line-strong); }
.step.active .step-node { border-color: var(--red); box-shadow: 0 0 0 4px var(--red-soft); }
.step.active .step-node .core { background: var(--red); animation: corePulse 1.2s ease-in-out infinite; }
@keyframes corePulse { 50% { transform: scale(1.25); opacity: 0.75; } }
.step.done .step-node { border-color: var(--green); background: var(--green-soft); }
.step.done .step-node .core { width: 10px; height: 10px; background: transparent; border: 0; }
.step.done .step-node::after {
  content: ""; position: absolute; width: 7px; height: 4px;
  border-left: 2px solid var(--green); border-bottom: 2px solid var(--green);
  transform: rotate(-45deg) translate(0, -1px);
}
.step-title {
  display: flex; align-items: center; gap: 10px; font-size: 15px; font-weight: 600;
  color: var(--text); min-height: 24px; margin-bottom: 4px;
}
.step.pending .step-title { color: var(--text-faint); }
.step .kind {
  font-family: "JetBrains Mono", monospace; font-size: 14px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase; padding: 3px 8px; border-radius: 4px;
  background: var(--bg); color: var(--text-dim); border: 1px solid var(--line);
}
.step.active .kind.kind-REASONING, .step.done .kind.kind-REASONING { background: var(--purple-soft); color: var(--purple); border-color: rgba(124,58,237,0.2); }
.step.active .kind.kind-THINKING,  .step.done .kind.kind-THINKING  { background: var(--blue-soft);   color: var(--blue);   border-color: rgba(29,78,216,0.2); }
.step.active .kind.kind-TOOL,      .step.done .kind.kind-TOOL      { background: var(--green-soft);  color: var(--green);  border-color: rgba(4,120,87,0.25); }
.step.active .kind.kind-WRITING,   .step.done .kind.kind-WRITING   { background: var(--amber-soft);  color: var(--amber);  border-color: rgba(180,83,9,0.2); }
.step .step-dur { font-family: "JetBrains Mono", monospace; font-size: 14px; color: var(--text-faint); margin-left: auto; }
.step-via { font-size: 14px; font-weight: 500; color: var(--text-dim); background: var(--bg); border: 1px solid var(--line); border-radius: 4px; padding: 2px 7px; letter-spacing: 0.02em; }
.step-toggle { background: none; border: none; padding: 2px 0 6px; font-size: 14px; color: var(--text-dim); cursor: pointer; font-family: inherit; display: flex; align-items: center; gap: 5px; }
.step-toggle:hover { color: var(--text-muted); }
.timeline-toolbar { display: flex; justify-content: flex-end; margin-bottom: 6px; }
.step-body { padding-top: 8px; }
.thought {
  font-size: 14px; line-height: 1.7; font-style: italic;
  color: var(--text-muted); white-space: pre-wrap;
  background: var(--bg-panel); border: 1px solid var(--line); border-radius: 10px;
  padding: 14px 16px;
}
.thought .cursor {
  display: inline-block; width: 2px; height: 15px; background: var(--red);
  margin-left: 2px; vertical-align: -3px; animation: blink 1s steps(2) infinite;
}
@keyframes blink { 50% { opacity: 0; } }
.tool {
  margin-top: 8px; border: 1px solid var(--line-strong); border-radius: 10px;
  background: var(--card); overflow: hidden;
}
.step.active .tool { border-color: var(--red-mid); background: var(--bg-panel); }
.tool-head {
  display: flex; align-items: center; gap: 10px; padding: 10px 14px;
  border-bottom: 1px solid var(--line); font-size: 14px; background: var(--bg);
}
.tool-head .icon {
  width: 22px; height: 22px; border-radius: 6px; background: var(--red-soft);
  display: grid; place-items: center; color: var(--red); flex-shrink: 0;
}
.tool-head .tname { font-family: "JetBrains Mono", monospace; font-size: 14px; color: var(--text); font-weight: 600; }
.tool-head .tstate { margin-left: auto; font-size: 14px; color: var(--text-dim); font-family: "JetBrains Mono", monospace; display: inline-flex; align-items: center; gap: 5px; }
.tool-head .tstate.running { color: var(--red); }
.tool-head .tstate.done { color: var(--green); }
.spinner { width: 11px; height: 11px; border-radius: 50%; border: 2px solid var(--red-mid); border-top-color: var(--red); animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.tool-body { padding: 12px 14px; font-size: 14px; display: flex; flex-direction: column; gap: 8px; }
.tool-row { display: flex; align-items: baseline; gap: 10px; line-height: 1.6; }

.tool-narrative-more { background: none; border: none; padding: 2px 0 0; font-size: 14px; color: var(--red); cursor: pointer; font-weight: 600; font-family: inherit; display: block; }
.tool-narrative-more:hover { text-decoration: underline; }
.tool-results { display: flex; flex-direction: column; gap: 6px; padding-top: 10px; border-top: 1px solid var(--line); }
.show-more { margin-top: 6px; background: none; border: none; padding: 3px 0; font-size: 14px; color: var(--red); cursor: pointer; font-weight: 600; letter-spacing: 0.01em; }
.show-more:hover { text-decoration: underline; }
.tool-result { display: flex; align-items: flex-start; gap: 10px; font-size: 14px; color: var(--text-muted); animation: rowIn 0.3s ease-out backwards; }

.tool-result .bullet { width: 5px; height: 5px; border-radius: 50%; background: var(--red); flex-shrink: 0; margin-top: 5px; }
.tool-result .lead-wrap { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
.tool-result .lead { color: var(--text); font-weight: 500; }

.tool-result .src-excerpt { font-size: 14px; color: var(--text-muted); line-height: 1.5; }
.tool-result .tag { font-family: "JetBrains Mono", monospace; font-size: 14px; padding: 2px 7px; border-radius: 4px; background: var(--bg); color: var(--text-dim); letter-spacing: 0.04em; flex-shrink: 0; border: 1px solid var(--line); }
.tool-result .tag.alert { background: var(--danger-soft); color: var(--danger); border-color: rgba(220,38,38,0.2); }
.tool-result .tag.flag { background: var(--amber-soft); color: var(--amber); border-color: rgba(180,83,9,0.2); }
.tool-result .tag.ok { background: var(--green-soft); color: var(--green); border-color: rgba(4,120,87,0.2); }
.code-block {
  font-family: "JetBrains Mono", monospace; font-size: 14px; line-height: 1.65;
  background: var(--bg-code); border: 1px solid var(--line-strong); border-radius: 8px;
  padding: 12px 14px; color: var(--text); overflow-x: auto; white-space: pre;
}
.code-block .kw { color: #7C3AED; font-weight: 600; }
.code-block .str { color: var(--green); }
.code-block .num { color: var(--amber); }
/* Draft bars */
.draft { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
.draft-row { display: flex; align-items: center; gap: 12px; font-size: 14px; color: var(--text-muted); min-height: 24px; animation: rowIn 0.3s ease-out backwards; }
.draft-row .num { font-family: "JetBrains Mono", monospace; font-size: 14px; color: var(--text-faint); width: 22px; flex-shrink: 0; }
.draft-row .label { white-space: nowrap; flex-shrink: 0; color: var(--text); font-weight: 500; }
.draft-row.done .check { color: var(--green); }

.report-card {
  margin-top: 28px; border: 1.5px solid var(--red-mid); border-radius: 16px; padding: 26px 28px;

}
.report-card .badge { width: 50px; height: 50px; border-radius: 14px; background: var(--red-soft); border: 1.5px solid var(--red-mid); display: grid; place-items: center; color: var(--red); flex-shrink: 0; }
.report-card h3 { margin: 0 0 5px; font-size: 18px; font-weight: 800; color: var(--text); }

.report-stats .stat .v { font-size: 22px; font-weight: 800; font-family: "JetBrains Mono", monospace; }
.report-stats .stat .v.amber { color: var(--amber); }
.report-stats .stat .v.red { color: var(--danger); }

.report-stats .stat .v.green { color: var(--green); }
.report-stats .stat .k { font-size: 14px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-faint); font-weight: 700; }
.report-actions { display: flex; gap: 8px; }
/* ===== Subject detail modal ===== */
.subject-modal-backdrop { position: fixed; inset: 0; z-index: 80; background: rgba(0,0,0,0.45); backdrop-filter: blur(3px); display: flex; align-items: center; justify-content: center; animation: fadeIn 0.15s ease-out; }
.subject-modal { background: var(--bg-panel); border: 1px solid var(--line-strong); border-radius: 12px; box-shadow: 0 12px 48px rgba(0,0,0,0.22); width: min(560px, calc(100vw - 48px)); max-height: 70vh; display: flex; flex-direction: column; animation: overlayIn 0.18s cubic-bezier(0.2,0.7,0.3,1); }
.subject-modal-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--line); flex-shrink: 0; }

.subject-modal-close { width: 28px; height: 28px; border-radius: 7px; border: 1.5px solid var(--line-strong); background: transparent; color: var(--text-muted); cursor: pointer; display: grid; place-items: center; transition: all 0.12s; }

/* ===== Report overlay ===== */
.overlay { position: fixed; top: 60px; left: 300px; right: 0; bottom: 0; z-index: 50; background: rgba(0,0,0,0.35); backdrop-filter: blur(4px); display: flex; align-items: stretch; padding: 12px; animation: fadeIn 0.2s ease-out; }

.overlay-download { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 8px; border: 1.5px solid var(--line-strong); background: transparent; color: var(--text-muted); font: 600 12px/1 inherit; cursor: pointer; transition: all 0.15s; }
.overlay-download:hover { background: var(--red-soft); color: var(--red); border-color: var(--red-mid); }
.overlay-body { overflow-y: auto; flex: 1; }

/* ===== Timeline scroll container ===== */

.timeline-scroll::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 3px; }

.fadein { animation: fadeIn 0.4s ease-out backwards; }
</style>
</head>

// ── Suggestions — representative sample from test_cases.csv ──────────────────
const SUGGESTIONS = [
  { id: "TC-001", query: "Run due diligence on Gpomct Grupo Empresarial." },
  { id: "TC-016", query: "Conduct enhanced due diligence on Daniel He (He Yi)." },

// ── Helpers ──────────────────────────────────────────────────────────────────
function shortHash(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) | 0;
  return Math.abs(h).toString(36).toUpperCase().slice(0, 6);
}

function fmtTime(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
}

function fmtDate(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  const now = new Date();
  if (d.toDateString() === now.toDateString()) return "Today " + fmtTime(iso);
  return d.toLocaleDateString([], { month: "short", day: "numeric" }) + " " + fmtTime(iso);
}

function isLongSubject(subject) {
  return (subject || "").split("\n").length > 3 || (subject || "").length > 200;
}

function subjectDisplay(subject, jobId) {
  return isLongSubject(subject) ? "Task #" + jobId.slice(0, 8).toUpperCase() : subject;
}

// Pending run job — set before RunPanel mounts so useEffect can pick it up on mount
let _pendingRunJobId = null;

const TOOL_META = {
  search_knowledgebase: { title: "Searching internal knowledge base", icon: "book", kind: "TOOL" },
  get_entity_by_id:    { title: "Looking up entity in knowledge base", icon: "book", kind: "TOOL" },
  execute:             { title: "Querying transaction database", icon: "database", kind: "TOOL" },
  get_schema_info:     { title: "Loading database schema", icon: "database", kind: "TOOL" },
  web_search:          { title: "Searching open-source intelligence", icon: "globe", kind: "TOOL" },
};

function toolMeta(name) {
  return TOOL_META[name] || { title: name, icon: "code", kind: "TOOL" };
}

function formatToolArgs(tool, args) {
  if (!args) return [];
  if (tool === "execute") return [{ k: "SQL", v: (args.query || "").slice(0, 200), mono: true, isCode: true }];
  if (tool === "search_knowledgebase") return [{ k: "query", v: args.keyword || args.query || JSON.stringify(args), mono: true }];
  if (tool === "web_search") return [{ k: "query", v: args.query || JSON.stringify(args), mono: true }];
  if (tool === "get_schema_info") return [];
  if (tool === "get_entity_by_id") return [{ k: "entity_id", v: args.entity_id || JSON.stringify(args), mono: true }];
  return Object.entries(args).slice(0, 3).map(([k, v]) => ({ k, v: String(v).slice(0, 80) }));
}

function parseToolResults(tool, resultText) {
  if (!resultText) return [];
  try {
    if (tool === "execute") {
      if (resultText.startsWith("Query Error")) return [{ lead: resultText.slice(0, 80), tag: "error", tone: "alert" }];
      const lines = resultText.split("\n").filter(l => l.includes("|"));
      const rows = lines.filter((_, i) => i > 1); // skip header + separator
      const count = rows.length;
      return [
        { lead: `${count} row${count !== 1 ? "s" : ""} returned`, tag: String(count), tone: count > 5 ? "flag" : "ok" },
        ...rows.slice(0, 3).map(r => ({ lead: r.split("|").map(c => c.trim()).filter(Boolean).join(" · ").slice(0, 70), tag: "", tone: "" })),
      ];
    }
    if (tool === "search_knowledgebase") {
      if (resultText.includes("No matches found")) return [{ lead: "No matches found in knowledge base", tag: "clear", tone: "ok" }];
      const nameLines = resultText.match(/Name:\s*(.+)/g) || [];
      const sourcLines = resultText.match(/Source:\s*(.+)/g) || [];
      return nameLines.slice(0, 4).map((nl, i) => ({
        lead: nl.replace("Name:", "").trim(),
        tag: (sourcLines[i] || "").replace("Source:", "").trim().slice(0, 20) || "match",
        tone: "flag",
      }));
    }
    if (tool === "web_search") {
      const sepIdx = resultText.indexOf("---\nCITABLE SOURCES");
      const citIdx = resultText.indexOf("CITABLE SOURCES");
      const splitAt = sepIdx !== -1 ? sepIdx : citIdx;

      const narrative = splitAt !== -1 ? resultText.slice(0, splitAt).trim() : "";
      const afterSplit = splitAt !== -1 ? resultText.slice(splitAt) : resultText;

      const items = [];
      if (narrative) items.push({ isNarrative: true, text: narrative });

      const srcStart = afterSplit.indexOf("CITABLE SOURCES");
      if (srcStart === -1) {
        if (resultText.includes("SEARCH_INCONCLUSIVE")) items.push({ lead: "Search inconclusive — no grounding sources returned", tag: "warn", tone: "flag" });
        else if (!narrative) items.push({ lead: "No citable sources returned", tag: "warn", tone: "flag" });
        return items;
      }
      const srcLines = afterSplit.slice(srcStart).split("\n").filter(l => l.trim().startsWith("- "));
      if (srcLines.length === 0) {
        if (!narrative) items.push({ lead: "No citable sources returned", tag: "warn", tone: "flag" });
        return items;
      }
      srcLines.forEach(l => {
        const parts = l.replace(/^-\s*/, "").split(" | ");
        items.push({ lead: (parts[0] || "").trim(), url: (parts[1] || "").trim(), excerpt: (parts[2] || "").trim().slice(0, 120), tag: "source", tone: "" });
      });
      return items;
    }
    if (tool === "get_schema_info") return [{ lead: "Database schema retrieved", tag: "ok", tone: "ok" }];
    if (tool === "get_entity_by_id") {
      if (resultText.includes("No entity found")) return [{ lead: "Entity not found", tag: "clear", tone: "" }];
      return [{ lead: resultText.slice(0, 80), tag: "entity", tone: "" }];
    }
  } catch (_) {}
  return [{ lead: resultText.slice(0, 80), tag: "result", tone: "" }];
}

function sqlHighlight(code) {
  return code
    .replace(/(\b)(SELECT|FROM|WHERE|AND|OR|ORDER BY|GROUP BY|HAVING|LIMIT|OFFSET|JOIN|LEFT|RIGHT|INNER|ON|AS|DISTINCT|COUNT|SUM|AVG|MIN|MAX|interval|now|DESC|ASC|WITH|UNION|NOT|IN|LIKE|IS|NULL|BETWEEN)(\b)/g, '$1<span class="kw">$2</span>$3')
    .replace(/('[^']*')/g, '<span class="str">$1</span>')
    .replace(/(\b\d+(\.\d+)?\b)/g, '<span class="num">$1</span>');
}

// ── API ───────────────────────────────────────────────────────────────────────
const API_BASE = "";  // same origin

async function apiRequest(path, opts = {}, passcode) {
  const res = await fetch(API_BASE + path, {
    ...opts,
    headers: {
      "Content-Type": "application/json",
      "X-Demo-Passcode": passcode || "",
      ...(opts.headers || {}),
    },
  });
  if (!res.ok) {
    const text = await res.text();
    throw Object.assign(new Error(text || `HTTP ${res.status}`), { status: res.status });
  }
  return res;
}

async function checkPasscode(passcode) {
  const res = await apiRequest("/api/jobs", { method: "GET" }, passcode);
  return res.ok;
}

async function fetchJobs(passcode) {
  const res = await apiRequest("/api/jobs", {}, passcode);
  return res.json();
}

async function createJob(subject, passcode) {
  const res = await apiRequest("/api/jobs", { method: "POST", body: JSON.stringify({ subject }) }, passcode);
  return res.json();
}

async function deleteJob(id, passcode) {
  await apiRequest(`/api/jobs/${id}`, { method: "DELETE" }, passcode);
}

async function fetchJob(id, passcode) {
  const res = await apiRequest(`/api/jobs/${id}`, {}, passcode);
  return res.json();
}

async function* streamExecute(jobId, passcode) {
  const res = await fetch(`${API_BASE}/api/jobs/${jobId}/execute`, {
    method: "POST",
    headers: { "X-Demo-Passcode": passcode, "Content-Type": "application/json" },
  });
  if (!res.ok) {
    const text = await res.text();
    throw new Error(text || `HTTP ${res.status}`);
  }
  const reader = res.body.getReader();
  const dec = new TextDecoder();
  let buf = "";
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += dec.decode(value, { stream: true });
    const parts = buf.split("\n\n");
    buf = parts.pop() || "";
    for (const chunk of parts) {
      const line = chunk.split("\n").find(l => l.startsWith("data: "));
      if (line) {
        try { yield JSON.parse(line.slice(6)); } catch (_) {}
      }
    }
  }
}

// ── Passcode screen ──────────────────────────────────────────────────────────
function PasscodeScreen({ onSuccess }) {
  const [val, setVal] = useState("");
  const [err, setErr] = useState("");
  const [loading, setLoading] = useState(false);

  async function submit(e) {
    e.preventDefault();
    if (!val.trim()) return;
    setLoading(true); setErr("");
    try {
      await checkPasscode(val.trim());
      onSuccess(val.trim());
    } catch (ex) {
      setErr(ex.status === 401 ? "Incorrect passcode. Please try again." : "Connection error — is the backend running?");
    } finally {
      setLoading(false);
    }
  }

  return (
    <div className="passcode-screen">
      <div className="passcode-card">
        <div className="passcode-icon">{I.shield(24)}</div>
        <h2>AML Agent Demo</h2>
        <p>Enter the access passcode to continue.</p>
        <form onSubmit={submit}>
          <input
            className="passcode-input" type="password" autoFocus
            placeholder="Enter passcode…" value={val}
            onChange={e => { setVal(e.target.value); setErr(""); }}
          />
          {err && <div className="passcode-error">{err}</div>}
          <button className="btn-primary" type="submit" disabled={loading || !val}>
            {loading ? "Checking…" : "Enter →"}
          </button>
        </form>
      </div>
    </div>
  );
}

// ── Timeline step components ──────────────────────────────────────────────────
const COLLAPSE_LINES = 5;
function ThoughtStream({ text, isActive }) {
  const [expanded, setExpanded] = useState(false);
  const lines = (text || "").split("\n");
  const collapsed = !expanded && !isActive && lines.length > COLLAPSE_LINES;
  const shown = collapsed ? lines.slice(0, COLLAPSE_LINES).join("\n") : text;
  return (
    <div className="thought">
      {shown}
      {collapsed && "…"}
      {isActive && <span className="cursor" />}
      {!isActive && lines.length > COLLAPSE_LINES && (
        <button className="show-more" onClick={() => setExpanded(e => !e)}>
          {expanded ? "Show less" : `Show ${lines.length - COLLAPSE_LINES} more lines`}
        </button>
      )}
    </div>
  );
}

const NARRATIVE_LIMIT = 400;

function ToolCard({ step }) {
  const { tool, args, results, state } = step;
  const [resultsExpanded, setResultsExpanded] = useState(false);
  const [narrativeExpanded, setNarrativeExpanded] = useState(false);
  const meta = toolMeta(tool);
  const fmtArgs = formatToolArgs(tool, args);
  const isCode = tool === "execute" && args && args.query;
  const IconComp = I[meta.icon] || I.code;
  const isRunning = state === "active";

  const allResults = results || [];
  const narrativeItem = allResults.find(r => r.isNarrative);
  const sourceItems = allResults.filter(r => !r.isNarrative);
  const shownSources = resultsExpanded ? sourceItems : sourceItems.slice(0, COLLAPSE_LINES);
  const hiddenCount = sourceItems.length - shownSources.length;

  const narrativeText = narrativeItem?.text || "";
  const narrativeLong = narrativeText.length > NARRATIVE_LIMIT;
  const shownNarrative = narrativeLong && !narrativeExpanded
    ? narrativeText.slice(0, NARRATIVE_LIMIT) + "…"
    : narrativeText;

  return (
    <div className="tool">
      <div className="tool-head">
        <span className="icon">{IconComp()}</span>
        <span className="tname">{tool}()</span>
        <span className={"tstate " + (isRunning ? "running" : "done")}>
          {isRunning ? <><span className="spinner" /> running</> : <>{I.check(10)} ok</>}
        </span>
      </div>
      <div className="tool-body">
        {isCode ? (
          <pre className="code-block" dangerouslySetInnerHTML={{ __html: sqlHighlight(args.query || "") }} />
        ) : (
          fmtArgs.map((a, i) => (
            <div key={i} className="tool-row">
              <span className="k">{a.k}</span>
              <span className={"v" + (a.mono ? " mono" : "")}>{a.v}</span>
            </div>
          ))
        )}
        {narrativeItem && (
          <div>
            <p className="tool-narrative">{shownNarrative}</p>
            {narrativeLong && (
              <button className="tool-narrative-more" onClick={() => setNarrativeExpanded(e => !e)}>
                {narrativeExpanded ? "Show less" : "Show more"}
              </button>
            )}
          </div>
        )}
        {sourceItems.length > 0 && (
          <div className="tool-results">
            {shownSources.map((r, i) => (
              <div key={i} className="tool-result" style={{ animationDelay: `${i * 0.04}s` }}>
                <span className="bullet" />
                <span className="lead-wrap">
                  <span className="lead">{r.lead}</span>
                  {r.url && <a className="src-url" href={r.url} target="_blank" rel="noopener noreferrer">{r.url}</a>}
                  {r.excerpt && <span className="src-excerpt">{r.excerpt}</span>}
                </span>
                {r.tag && !r.url && <span className={"tag " + (r.tone || "")}>{r.tag}</span>}
              </div>
            ))}
            {(hiddenCount > 0 || resultsExpanded) && (
              <button className="show-more" onClick={() => setResultsExpanded(e => !e)}>
                {resultsExpanded ? "Show less" : `Show ${hiddenCount} more`}
              </button>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

function Step({ step, index, isCollapsed, onToggle }) {
  const { kind, title, state } = step;
  const meta = toolMeta(step.tool || "");
  const hasBody = state !== "pending";

  return (
    <div className={"step " + state}>
      <div className="step-node"><div className="core" /></div>
      <div className="step-title">
        <span className={"kind kind-" + kind}>{KIND_EMOJI[kind]} {kind}</span>
        <span>{title}</span>
        {step.tool === "web_search" && (
          <span className="step-via">Google Search · Gemini Grounding</span>
        )}
        {step.elapsedMs != null && state !== "pending" && (
          <span className="step-dur">{(step.elapsedMs / 1000).toFixed(1)}s</span>
        )}
      </div>
      {hasBody && onToggle && (
        <button className="step-toggle" onClick={onToggle}>
          {isCollapsed ? "▶ Show details" : "▼ Hide details"}
        </button>
      )}
      {hasBody && !isCollapsed && (
        <div className="step-body">
          {(kind === "THINKING" || kind === "REASONING") && (
            <ThoughtStream text={step.text || ""} isActive={state === "active"} />
          )}
          {kind === "TOOL" && <ToolCard step={step} />}

      )}

function ReportOverlay({ jobId, subject, onClose }) {
  const [reportHtml, setReportHtml] = useState(null);
  const [loading, setLoading] = useState(true);
  const [fetchError, setFetchError] = useState(null);

  useEffect(() => {
    const h = e => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, [onClose]);

  useEffect(() => {
    if (!jobId) return;
    const passcode = sessionStorage.getItem("aml_passcode") || "";
    setLoading(true);
    setFetchError(null);
    fetch(`${API_BASE}/api/jobs/${jobId}/report`, {
      headers: { "X-Demo-Passcode": passcode },
    })
      .then(r => {
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return r.text();
      })
      .then(html => { setReportHtml(html); setLoading(false); })
      .catch(err => { setFetchError(err.message); setLoading(false); });
  }, [jobId]);

  function handleDownload() {
    if (!reportHtml) return;
    const blob = new Blob([reportHtml], { type: "text/html" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    const safeName = (subject || "report").replace(/[^a-z0-9]/gi, "-").slice(0, 40);
    a.download = `AML-Report-${safeName}-${(jobId || "").slice(0, 8).toUpperCase()}.html`;
    a.click();
    URL.revokeObjectURL(url);
  }

  return (
    <div className="overlay" onClick={onClose}>
      <div className="overlay-card" onClick={e => e.stopPropagation()}>
        <div className="overlay-head">
          <div className="ttl">
            <span className="doc">{I.doc()}</span>
            <div>
              <div>AML Investigation Report</div>
              <div className="meta">AML-{jobId ? jobId.slice(0, 8).toUpperCase() : "UNKNOWN"} · {subject}</div>
            </div>
          </div>
          <div className="overlay-actions">
            {reportHtml && (
              <button className="overlay-download" onClick={handleDownload}>
                {I.external(12)} Download HTML
              </button>
            )}
            <button className="overlay-close" onClick={onClose}>{I.close()}</button>
          </div>
        </div>
        <div className="overlay-body overlay-body-iframe">
          {loading && (
            <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100%", color: "var(--text-muted)", fontSize: 15, gap: 10 }}>
              <span className="spinner" style={{ width: 16, height: 16, borderWidth: 2 }} />
              Rendering report…
            </div>
          )}
          {fetchError && (
            <div style={{ padding: 32, color: "var(--danger)", fontSize: 14 }}>Failed to load report: {fetchError}</div>
          )}
          {reportHtml && (
            <iframe
              srcDoc={reportHtml}
              style={{ width: "100%", height: "100%", border: "none", display: "block" }}
              title="AML Investigation Report"
              sandbox="allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox"
            />
          )}
        </div>
      </div>
    </div>
  );
}

// ── Run panel (live stream or replay) ────────────────────────────────────────
function RunPanel({ job, onRunQueued, onRetry, onOpenReport, onNewInvestigation }) {
  const stepsRef = useRef([]);
  const [updateCount, forceUpdate] = useReducer(x => x + 1, 0);
  const toolQueue = useRef({});
  const [reportData, setReportData] = useState(null);
  const [isDone, setIsDone] = useState(false);
  const [elapsed, setElapsed] = useState(0);
  const [error, setError] = useState(null);
  const [showSubject, setShowSubject] = useState(false);
  const startedAt = useRef(null);
  const timerRef = useRef(null);
  const isFirstThought = useRef(true);
  const timelineRef = useRef(null);
  const replayedCountRef = useRef(0);
  const [collapsedSet, setCollapsedSet] = useState(new Set());

  function addStep(step) {
    stepsRef.current = [...stepsRef.current, step];
    forceUpdate();
    return stepsRef.current.length - 1;
  }

  function mutateLastStep(updater) {
    const steps = stepsRef.current;
    if (!steps.length) return;
    const last = { ...steps[steps.length - 1] };
    updater(last);
    stepsRef.current = [...steps.slice(0, -1), last];
    forceUpdate();
  }

  function mutateStep(idx, updater) {
    const steps = [...stepsRef.current];
    if (idx < 0 || idx >= steps.length) return;
    steps[idx] = { ...steps[idx] };
    updater(steps[idx]);
    stepsRef.current = steps;
    forceUpdate();
  }

  function closeActiveThinking() {
    const last = stepsRef.current[stepsRef.current.length - 1];
    if (last && (last.kind === "THINKING" || last.kind === "REASONING") && last.state === "active") {
      mutateLastStep(s => { s.state = "done"; });
    }
  }

  function handleEvent(ev) {
    if (ev.type === "status") return;

    if (ev.type === "thinking") {
      const last = stepsRef.current[stepsRef.current.length - 1];
      if (last && (last.kind === "THINKING" || last.kind === "REASONING") && last.state === "active") {
        mutateLastStep(s => { s.text = (s.text || "") + (s.text ? "\n" : "") + ev.content; });
      } else {
        const kind = isFirstThought.current ? "REASONING" : "THINKING";
        isFirstThought.current = false;
        addStep({ kind, title: kind === "REASONING" ? "Forming plans" : "Synthesizing findings", state: "active", text: ev.content });
      }
      return;
    }

    if (ev.type === "tool_call") {
      closeActiveThinking();
      const meta = toolMeta(ev.tool);
      const idx = addStep({ kind: "TOOL", title: meta.title, state: "active", tool: ev.tool, args: ev.args, results: [] });
      toolQueue.current[ev.tool] = (toolQueue.current[ev.tool] || []);
      toolQueue.current[ev.tool].push(idx);
      return;
    }

    if (ev.type === "tool_result") {
      const queue = toolQueue.current[ev.tool] || [];
      if (queue.length) {
        const idx = queue.shift();
        mutateStep(idx, s => {
          s.state = "done";
          s.results = parseToolResults(ev.tool, ev.result);
          s.elapsedMs = startedAt.current ? Date.now() - startedAt.current : null;
        });
      }
      return;
    }

    if (ev.type === "report") {
      closeActiveThinking();
      const sections = (ev.markdown || "").split("\n")
        .filter(l => l.startsWith("## ") && !/risk assessment/i.test(l))
        .map(l => l.replace(/^##\s*/, "").trim());
      addStep({ kind: "WRITING", title: "Drafting investigation report", state: "done", sections });
      setReportData(ev);
      return;
    }

    if (ev.type === "done") {
      stepsRef.current = stepsRef.current.map(s => s.state === "active" ? { ...s, state: "done" } : s);
      forceUpdate();
      setIsDone(true);
      if (timerRef.current) clearInterval(timerRef.current);
      return;
    }

    if (ev.type === "error") {
      setError(ev.message);
      setIsDone(true);
      if (timerRef.current) clearInterval(timerRef.current);
      return;
    }
  }

  // Replay from stored events (completed job)
  function replayEvents(events) {
    stepsRef.current = [];
    toolQueue.current = {};
    isFirstThought.current = true;
    events.forEach(handleEvent);
    stepsRef.current = stepsRef.current.map(s => ({ ...s, state: "done" }));
    replayedCountRef.current = events.length; // prevent status-effect from double-replaying
    setCollapsedSet(new Set(stepsRef.current.map((_, i) => i)));
    setIsDone(true);
    forceUpdate();
  }

  // Replay partial events for an already-running job (keeps active states, no done/collapse)
  function replayRunningEvents(events, startedAtMs) {
    stepsRef.current = [];
    toolQueue.current = {};
    isFirstThought.current = true;
    events.forEach(handleEvent);
    replayedCountRef.current = events.length;
    startedAt.current = startedAtMs || Date.now();
    setElapsed(Date.now() - startedAt.current);
    if (timerRef.current) clearInterval(timerRef.current);
    timerRef.current = setInterval(() => setElapsed(Date.now() - startedAt.current), 500);
    forceUpdate();
  }

  // Run live stream
  async function runStream(jobId) {
    stepsRef.current = [];
    toolQueue.current = {};
    isFirstThought.current = true;
    setReportData(null);
    setIsDone(false);
    setError(null);
    setElapsed(0);
    setCollapsedSet(new Set());
    startedAt.current = Date.now();
    forceUpdate();

    timerRef.current = setInterval(() => {
      setElapsed(Date.now() - startedAt.current);
    }, 500);

    try {
      const passcode = sessionStorage.getItem("aml_passcode") || "";
      for await (const ev of streamExecute(jobId, passcode)) {
        handleEvent(ev);
      }
    } catch (ex) {
      setError(ex.message);
      setIsDone(true);
    } finally {
      if (timerRef.current) clearInterval(timerRef.current);
    }
  }

  // React to job changes
  useEffect(() => {
    if (!job) return;
    stepsRef.current = [];
    toolQueue.current = {};
    isFirstThought.current = true;
    replayedCountRef.current = 0;
    setReportData(null);
    setIsDone(false);
    setError(null);
    setCollapsedSet(new Set());
    forceUpdate();

    if (job.status === "completed" || job.status === "failed") {
      if (job.events && job.events.length > 0) {
        replayEvents(job.events);
        if (job.status === "completed") {
          setReportData({ markdown: job.report_md, risk_level: job.risk_level, subject: job.subject });
        } else {
          setError(job.error || "Investigation failed");
        }
        setIsDone(true);
      }
    } else if (job.status === "queued" && _pendingRunJobId === job.id) {
      _pendingRunJobId = null;
      runStream(job.id);
    } else if (job.status === "running") {
      const t0 = job.started_at ? new Date(job.started_at).getTime() : Date.now();
      if (job.events && job.events.length > 0) {
        replayRunningEvents(job.events, t0);
      } else {
        startedAt.current = t0;
        setElapsed(Date.now() - t0);
        if (timerRef.current) clearInterval(timerRef.current);
        timerRef.current = setInterval(() => setElapsed(Date.now() - startedAt.current), 500);
      }
    }
  }, [job?.id]);

  // Handle job completing/failing while panel is open (status changed on same job via polling)
  useEffect(() => {
    if (!job) return;
    if (job.status !== "completed" && job.status !== "failed") return;
    if (isDone) return; // already finalised (live stream or earlier replay)
    // Replay any events not yet shown (incremental effect may have covered some)
    if (job.events && job.events.length > 0) {
      const remaining = job.events.slice(replayedCountRef.current);
      remaining.forEach(ev => handleEvent(ev));
      replayedCountRef.current = job.events.length;
    }
    if (timerRef.current) clearInterval(timerRef.current);
    if (job.status === "completed") {
      setReportData({ markdown: job.report_md, risk_level: job.risk_level, subject: job.subject });
    } else {
      setError(job.error || "Investigation failed");
    }
    setIsDone(true);
  }, [job?.status]);

  // Incrementally replay events that arrived while watching a running job
  useEffect(() => {
    if (!job?.events?.length) return;
    const newEvents = job.events.slice(replayedCountRef.current);
    if (newEvents.length === 0) return;
    newEvents.forEach(ev => handleEvent(ev));
    replayedCountRef.current = job.events.length;
    forceUpdate();
  }, [job?.events?.length]);

  // Auto-scroll timeline to bottom while investigation is in progress only
  useEffect(() => {
    if (isDone) return;
    if (timelineRef.current) {
      timelineRef.current.scrollTop = timelineRef.current.scrollHeight;
    }
  }, [updateCount]);

  const [overlay, setOverlay] = useState(false);
  const steps = stepsRef.current;
  const status = job?.status || "queued";

  if (!job) return null;

  const fmtElapsed = () => {
    const s = Math.floor(elapsed / 1000);
    return `${String(Math.floor(s / 60)).padStart(2, "0")}:${String(s % 60).padStart(2, "0")}`;
  };

  return (
    <div className="run-panel fadein">
      <div className="run-head">
        <div>
          <div className="job-id">JOB · {job.id.slice(0, 8).toUpperCase()} · {fmtDate(job.created_at)}</div>
          <h2 className="job-title">
            {subjectDisplay(job.subject, job.id)}
            {isLongSubject(job.subject) && (
              <button className="view-request-link" onClick={() => setShowSubject(true)}>View request</button>
            )}
          </h2>
          {showSubject && <SubjectModal subject={job.subject} onClose={() => setShowSubject(false)} />}
          <div className="job-meta">
            <span>Status: <strong style={{ color: "var(--text)" }}>{job.status}</strong></span>
            {steps.length > 0 && <><span className="sep" /><span>{steps.length} steps</span></>}
            {elapsed > 0 && <><span className="sep" /><span style={{ fontFamily: "JetBrains Mono, monospace" }}>{fmtElapsed()}</span></>}
          </div>
        </div>
        <div>
          {status === "running" && <span className="status-pill running"><span className="pulse" />Investigating</span>}
          {status === "completed" && !isDone && <span className="status-pill running"><span className="pulse" />Investigating</span>}
          {isDone && !error && <span style={{ display: "inline-flex", alignItems: "center", gap: 8 }}>
            <span className="status-pill done">{I.check(11)} Report ready</span>
            <button className="btn-run" style={{ padding: "8px 16px", fontSize: 14, fontWeight: 600, boxShadow: "none" }} onClick={() => setOverlay(true)}>{I.external(12)} View report</button>
          </span>}
          {error && <span style={{ display: "inline-flex", alignItems: "center", gap: 8 }}>
            <span className="status-pill failed">{I.close(11)} Failed</span>
            <button className="btn-queue" style={{ padding: "8px 16px", fontSize: 14}} onClick={() => { onRetry && onRetry(job.id); runStream(job.id); }}>Retry</button>
          </span>}
          {status === "queued" && !isDone && <span className="status-pill queued">{I.list(11)} Queued</span>}
        </div>
      </div>

      {status === "queued" && steps.length === 0 && (
        <div style={{ marginBottom: 20 }}>
          <p style={{ color: "var(--text-muted)", fontSize: 14, margin: "0 0 14px" }}>
            This investigation is queued and ready to run.
          </p>
          <button className="btn-run" style={{ padding: "11px 22px" }} onClick={() => { onRunQueued(job.id); runStream(job.id); }}>
            {I.send()} Start investigation
          </button>
        </div>
      )}

      {error && (
        <div style={{ background: "rgba(255,138,138,0.08)", border: "1px solid rgba(255,138,138,0.2)", borderRadius: 10, padding: "12px 16px", marginBottom: 16, fontSize: 14, color: "var(--red)" }}>
          <strong>Error:</strong> {error}
        </div>
      )}

      {steps.length > 0 && (
        <>
          {isDone && (
            <div className="timeline-toolbar">
              {collapsedSet.size > 0
                ? <button className="btn-ghost" style={{ fontSize: 14, padding: "3px 10px" }} onClick={() => setCollapsedSet(new Set())}>Expand all</button>
                : <button className="btn-ghost" style={{ fontSize: 14, padding: "3px 10px" }} onClick={() => setCollapsedSet(new Set(steps.map((_, i) => i)))}>Collapse all</button>
              }
            </div>
          )}
          <div className="timeline-scroll" ref={timelineRef}>
            <div className="timeline">
              {steps.map((step, i) => (
                <Step
                  key={i}
                  step={step}
                  index={i}
                  isCollapsed={isDone ? collapsedSet.has(i) : false}
                  onToggle={isDone ? () => setCollapsedSet(prev => {
                    const next = new Set(prev);
                    if (next.has(i)) next.delete(i); else next.add(i);
                    return next;
                  }) : undefined}
                />
              ))}
            </div>
          </div>
        </>
      )}

      {isDone && !error && reportData && (
        <ReportCard
          job={{ ...job, risk_level: reportData.risk_level }}
          elapsed={elapsed || (job.finished_at && job.started_at ? new Date(job.finished_at) - new Date(job.started_at) : null)}
          onOpen={() => setOverlay(true)}
          onNew={onNewInvestigation}
        />
      )}

      {status === "running" && steps.length > 0 && !isDone && (
        <div className="run-actions">
          <button className="btn-ghost">{I.stop()} Investigation in progress…</button>
        </div>
      )}

      {overlay && (
        <ReportOverlay
          jobId={job.id}
          subject={job.subject}
          onClose={() => setOverlay(false)}
        />
      )}
    </div>
  );
}

// ── Root app ──────────────────────────────────────────────────────────────────
function App() {
  const [passcode, setPasscode] = useState(() => sessionStorage.getItem("aml_passcode") || "");
  const [authed, setAuthed] = useState(false);
  const [jobs, setJobs] = useState([]);
  const [selectedJob, setSelectedJob] = useState(null);
  const [view, setView] = useState("composer");  // "composer" | "job"
  const pollRef = useRef(null);

  function handleAuth(pc) {
    sessionStorage.setItem("aml_passcode", pc);
    setPasscode(pc);
    setAuthed(true);
  }

  async function loadJobs() {
    try {
      const data = await fetchJobs(passcode);
      setJobs(data);
      setSelectedJob(prev => {
        if (!prev) return prev;
        const updated = data.find(j => j.id === prev.id);
        if (!updated) return prev;
        // For running jobs (and just-finished running jobs), always fetch the full job
        // so RunPanel gets partial/complete events for replay.
        if (updated.status === "running" || prev.status === "running") {
          fetchJob(updated.id, passcode)
            .then(full => setSelectedJob(curr => curr?.id === full.id ? full : curr))
            .catch(() => {});
          return prev; // keep full version until async fetch resolves
        }
        return updated;
      });
    } catch (_) {}
  }

  // Poll jobs every 4s while there are running ones
  useEffect(() => {
    if (!authed) return;
    loadJobs();
    pollRef.current = setInterval(() => {
      loadJobs();
    }, 4000);
    return () => clearInterval(pollRef.current);
  }, [authed]);

  async function handleQueue(subject) {
    const job = await createJob(subject, passcode);
    await loadJobs();
    selectJob(job);
  }

  async function handleRunNow(subject) {
    const job = await createJob(subject, passcode);
    _pendingRunJobId = job.id;
    await loadJobs();
    selectJob(job);
  }

  function selectJob(job) {
    if (job.status === "completed" || job.status === "failed") {
      // Wait for full events before showing, to avoid flash of empty content
      fetchJob(job.id, passcode).then(full => {
        setSelectedJob(full);
        setView("job");
      }).catch(() => {
        setSelectedJob(job);
        setView("job");
      });
    } else if (job.status === "running") {
      // Show immediately, then update with partial events
      setSelectedJob(job);
      setView("job");
      fetchJob(job.id, passcode)
        .then(full => setSelectedJob(curr => curr?.id === full.id ? full : curr))
        .catch(() => {});
    } else {
      setSelectedJob(job);
      setView("job");
    }
  }

  async function handleDelete(jobId) {
    await deleteJob(jobId, passcode);
    await loadJobs();
    if (selectedJob?.id === jobId) {
      setSelectedJob(null);
      setView("composer");
    }
  }

  async function handleRunQueued(jobId) {
    await loadJobs();
  }

  async function handleRetry(jobId) {
    await loadJobs();
  }

  // Check passcode from session on mount
  useEffect(() => {
    const pc = sessionStorage.getItem("aml_passcode");
    if (pc) {
      checkPasscode(pc)
        .then(() => { setPasscode(pc); setAuthed(true); })
        .catch(() => { sessionStorage.removeItem("aml_passcode"); });
    }
  }, []);

  if (!authed) {
    return (
      <div>
        <div className="sky" />
        <nav className="nav">
          <div className="brand">
            <span className="shield">{I.shield(20)}</span>
            <span><span className="b1">Real-time</span><span className="b2"> AML Agent</span></span>
          </div>
          <span className="nav-badge">DEMO</span>
        </nav>
        <PasscodeScreen onSuccess={handleAuth} />
      </div>
    );
  }

  return (
    <div>
      <div className="sky" />
      <nav className="nav">
        <div className="brand">
          <span className="shield">{I.shield(20)}</span>
          <span><span className="b1">Real-time</span><span className="b2"> AML Agent</span></span>
        </div>
        <span className="nav-badge">DEMO</span>
      </nav>
      <div className="app-layout">
        <Sidebar
          jobs={jobs}
          selectedId={selectedJob?.id}
          onSelect={selectJob}
          onNew={() => { setSelectedJob(null); setView("composer"); }}
          onRun={job => {
            _pendingRunJobId = job.id;
            selectJob(job);
          }}
          onDelete={handleDelete}
        />
        <div className="detail-panel">
          {view === "composer" && (
            <div style={{ flex: 1, overflowY: "auto" }}>
              <ComposerPanel onQueue={handleQueue} onRunNow={handleRunNow} />
            </div>
          )}
          {view === "job" && selectedJob && (
            <RunPanel
              key={selectedJob.id}
              job={selectedJob}
              onRunQueued={handleRunQueued}
              onRetry={handleRetry}
              onOpenReport={() => {}}
              onNewInvestigation={() => { setSelectedJob(null); setView("composer"); }}
            />
          )}
          {view === "job" && !selectedJob && (
            <div className="empty-state">
              <div className="empty-icon">{I.list(36)}</div>
              <h3>Select an investigation</h3>
              <p>Choose an investigation from the list or create a new one.</p>
            </div>
          )}
          {view === "composer" && jobs.length === 0 && (
            <div />
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
